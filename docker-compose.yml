services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PORT: "5505"
      RUST_LOG: "docx_jats_backend=info,tower_http=info"
      LOG_FORMAT: "json"
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5505/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      PORT: "3000"
      NODE_ENV: "production"
      # Must match your public domain — SvelteKit uses this for CSRF protection
      ORIGIN: "${ORIGIN:-http://localhost}"
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
    driver: bridge
