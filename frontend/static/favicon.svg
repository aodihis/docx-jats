<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Sky background -->
  <rect width="32" height="32" rx="7" fill="#fff8e1"/>
  <!-- Sun rays -->
  <g stroke="#f59e0b" stroke-width="2" stroke-linecap="round">
    <line x1="16" y1="3"  x2="16" y2="6"/>
    <line x1="16" y1="26" x2="16" y2="29"/>
    <line x1="3"  y1="16" x2="6"  y2="16"/>
    <line x1="26" y1="16" x2="29" y2="16"/>
    <line x1="6.5"  y1="6.5"  x2="8.6"  y2="8.6"/>
    <line x1="23.4" y1="23.4" x2="25.5" y2="25.5"/>
    <line x1="25.5" y1="6.5"  x2="23.4" y2="8.6"/>
    <line x1="8.6"  y1="23.4" x2="6.5"  y2="25.5"/>
  </g>
  <!-- Sun circle -->
  <circle cx="16" cy="16" r="6.5" fill="#fbbf24" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- Inner highlight -->
  <circle cx="14" cy="14" r="1.8" fill="#fef3c7" opacity="0.7"/>
</svg>
